version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: gem_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gem_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gem_password}
      POSTGRES_DB: ${POSTGRES_DB:-gem_db}
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-gem_user} -d ${POSTGRES_DB:-gem_db}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: gem_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-gem_redis_pass} --appendonly yes
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD:-gem_redis_pass}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: gem_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-gem_minio_user}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-gem_minio_pass}
      MINIO_API_CORS_ALLOW_ORIGIN: '*'
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 30s
      timeout: 20s
      retries: 3

  rtmp:
    image: alfg/nginx-rtmp:latest
    container_name: gem_rtmp
    restart: unless-stopped
    ports:
      - '1935:1935'
      - '8080:80'

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  default:
    name: gem_network
